name: Publish Materia Reborn 0.2B

on:
  push:
    branches:
      - main
    paths:
      - ".release/0.2B/**"
      - ".github/workflows/publish-0.2b.yml"

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Check out release commit
        uses: actions/checkout@v4

      - name: Rebuild release JAR
        shell: bash
        run: |
          cat .release/0.2B/jar.part-* > "$RUNNER_TEMP/materia-reborn.jar.b64"
          base64 --decode "$RUNNER_TEMP/materia-reborn.jar.b64" > "$RUNNER_TEMP/Materia-Reborn-0.2B.jar"

      - name: Verify release JAR
        shell: bash
        run: |
          echo "81185fde4aa5bebf6cceb8dc7c5cb71fde5ea96d25e64f8274aab257e5a7e058  $RUNNER_TEMP/Materia-Reborn-0.2B.jar" | sha256sum --check

      - name: Publish GitHub release
        shell: bash
        run: |
          if gh release view "0.2B" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "0.2B" "$RUNNER_TEMP/Materia-Reborn-0.2B.jar" --repo "$GITHUB_REPOSITORY" --clobber
            gh release edit "0.2B" --repo "$GITHUB_REPOSITORY" --title "Materia Reborn 0.2B" --notes-file ".release/0.2B/RELEASE_NOTES.md" --latest
          else
            gh release create "0.2B" "$RUNNER_TEMP/Materia-Reborn-0.2B.jar" --repo "$GITHUB_REPOSITORY" --target "$GITHUB_SHA" --title "Materia Reborn 0.2B" --notes-file ".release/0.2B/RELEASE_NOTES.md" --latest
          fi
